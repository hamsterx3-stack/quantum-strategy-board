<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#007BFF"/>
    </linearGradient>

    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icono tipo dashboard -->
  <rect x="8" y="10" width="44" height="12" rx="3" fill="url(#qGrad2)" filter="url(#glow2)"/>
  <rect x="8" y="26" width="26" height="12" rx="3" fill="url(#qGrad2)" opacity="0.8" filter="url(#glow2)"/>
  <rect x="38" y="26" width="14" height="12" rx="3" fill="url(#qGrad2)" opacity="0.5" filter="url(#glow2)"/>
  <rect x="8" y="42" width="44" height="12" rx="3" fill="url(#qGrad2)" opacity="0.7" filter="url(#glow2)"/>
</svg>
